<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>18° Compleanno Miriam</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #fcebe6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            display: none;
        }
        
        #screen1 {
            display: block;
            background-image: url('prompt_invito.png');
            cursor: pointer;
        }
        
        #screen2 {
            background-image: url('invito_Miriam.png');
        }

        #screen3 {
            background-image: url('conferma.png');
        }

        .btn-avanti-screen2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 75%;
            z-index: 10;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-link {
            position: absolute;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            z-index: 30;
        }
        
        /* SCHERMATA 2 - Pulsanti scesi al 4.5% per un allineamento perfetto */
        .btn-calendar {
            bottom: 4.5%;
            left: 22%;
            width: 25%;
            height: 6%;
            border-radius: 20px;
            background: rgba(0, 0, 255, 0.4); /* BLU */
        }
        .btn-maps {
            bottom: 4.5%;
            right: 22%;
            width: 25%;
            height: 6%;
            border-radius: 20px;
            background: rgba(255, 0, 0, 0.4); /* ROSSO */
        }

        /* SCHERMATA 3 - Bloccata e confermata come funzionante */
        .btn-partecipo {
            bottom: 11%;
            left: 15%;
            width: 70%;
            height: 6.5%;
            border-radius: 25px;
            background: rgba(0, 255, 0, 0.4); /* VERDE */
        }
        .btn-non-partecipo {
            bottom: 3%;
            left: 15%;
            width: 70%;
            height: 6.5%;
            border-radius: 25px;
            background: rgba(255, 165, 0, 0.4); /* OCRA/GIALLO */
        }

        #audio-control {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #d4af37;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    <div id="audio-control" onclick="toggleAudio()">🎵</div>

    <!-- SCHERMATA 1 -->
    <div id="screen1" class="screen" onclick="apriInvito()"></div>

    <!-- SCHERMATA 2 -->
    <div id="screen2" class="screen">
        <div class="btn-avanti-screen2" onclick="mostraSchermata(3)"></div>
        <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=18%C2%B0+Compleanno+Miriam+%F0%9F%8E%89&dates=20260812T200000/20260813T020000&details=Ti+aspetto+per+festeggiare+insieme%21&location=Wild+Horse%2C+Via+S.+Pancrazio+28%2C+67051+Castelvecchio+%28AQ%29" target="_blank" class="btn-link btn-calendar"></a>
        <a href="https://www.google.com/maps/search/?api=1&query=Wild+Horse+Via+S.+Pancrazio+28+Castelvecchio+AQ" target="_blank" class="btn-link btn-maps"></a>
    </div>

    <!-- SCHERMATA 3 -->
    <div id="screen3" class="screen">
        <a href="https://wa.me/393471049595?text=Nome%3A%20%0ACognome%3A%20%0An.%20partecipanti%3A%20" target="_blank" class="btn-link btn-partecipo"></a>
        <a href="https://wa.me/393471049595?text=Nome%3A%20%0ACognome%3A%20%0A%0Ami%20dispiace%20molto%20ma%20purtroppo%20non%20potr%C3%B2%20partecipare%20al%20tuo%20compleanno%20%E2%9D%A4%EF%B8%8F" target="_blank" class="btn-link btn-non-partecipo"></a>
    </div>

    <script>
        var audio = document.getElementById('bg-music');
        var audioBtn = document.getElementById('audio-control');

        function apriInvito() {
            mostraSchermata(2);
            audio.play().then(function() {
                audioBtn.style.display = 'flex';
            }).catch(function(error) {
                console.log("Audio ready.");
                audioBtn.style.display = 'flex';
            });
        }

        function mostraSchermata(numeroSchermata) {
            document.getElementById('screen1').style.display = 'none';
            document.getElementById('screen2').style.display = 'none';
            document.getElementById('screen3').style.display = 'none';
            
            document.getElementById('screen' + numeroSchermata).style.display = 'block';
        }

        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                audioBtn.innerText = "🎵";
            } else {
                audio.pause();
                audioBtn.innerText = "🔇";
            }
        }
    </script>
</body>
</html>
