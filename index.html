<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>18° Compleanno Miriam</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #fcebe6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* Contenitore principale reattivo */
        .container {
            width: 100%;
            max-width: 430px;
            height: 100%;
            max-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Schermate */
        .screen {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
        }
        
        #screen1 {
            display: block;
            cursor: pointer;
        }

        /* La foto ora si adatta senza essere tagliata */
        .screen img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Area cliccabile generale per andare avanti nella Schermata 2 */
        .btn-avanti-screen2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 85%;
            z-index: 10;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* Pulsanti d'azione */
        .btn-link {
            position: absolute;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            z-index: 30;
        }

        /* SCHERMATA 2 - Maps e Calendar molto più in basso per centrare la grafica */
        .btn-calendar {
            bottom: 8%;
            left: 23%;
            width: 24%;
            height: 5.5%;
            border-radius: 20px;
            background: rgba(0, 0, 255, 0.4); /* BLU */
        }
        .btn-maps {
            bottom: 8%;
            right: 23%;
            width: 24%;
            height: 5.5%;
            border-radius: 20px;
            background: rgba(255, 0, 0, 0.4); /* ROSSO */
        }

        /* SCHERMATA 3 - WhatsApp decisamente più in basso */
        .btn-partecipo {
            bottom: 11%;
            left: 20%;
            width: 60%;
            height: 6.5%;
            border-radius: 25px;
            background: rgba(0, 255, 0, 0.4); /* VERDE */
        }
        .btn-non-partecipo {
            bottom: 3%;
            left: 20%;
            width: 60%;
            height: 6.5%;
            border-radius: 25px;
            background: rgba(255, 165, 0, 0.4); /* OCRA */
        }

        /* Controllo Audio */
        #audio-control {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #d4af37;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    <div id="audio-control" onclick="toggleAudio()">🎵</div>

    <div class="container">
        
        <!-- SCHERMATA 1 -->
        <div id="screen1" class="screen" onclick="apriInvito()">
            <img src="prompt_invito.png" alt="Copertina Invito">
        </div>

        <!-- SCHERMATA 2 -->
        <div id="screen2" class="screen">
            <img src="invito_Miriam.png" alt="Dettagli Invito">
            <!-- Toccando la parte alta della foto si va alla schermata 3 -->
            <div class="btn-avanti-screen2" onclick="mostraSchermata(3)"></div>
            <!-- Pulsanti Mappe e Calendario -->
            <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=18%C2%B0+Compleanno+Miriam+%F0%9F%8E%89&dates=20260812T200000/20260813T020000&details=Ti+aspetto+per+festeggiare+insieme%21&location=Wild+Horse%2C+Via+S.+Pancrazio+28%2C+67051+Castelvecchio+%28AQ%29" target="_blank" class="btn-link btn-calendar"></a>
            <a href="https://www.google.com/maps/search/?api=1&query=Wild+Horse+Via+S.+Pancrazio+28+Castelvecchio+AQ" target="_blank" class="btn-link btn-maps"></a>
        </div>

        <!-- SCHERMATA 3 -->
        <div id="screen3" class="screen">
            <img src="conferma.png" alt="Conferma Presenza">
            <a href="https://wa.me/393471049595?text=Nome%3A%20%0ACognome%3A%20%0An.%20partecipanti%3A%20" target="_blank" class="btn-link btn-partecipo"></a>
            <a href="https://wa.me/393471049595?text=Nome%3A%20%0ACognome%3A%20%0A%0Ami%20dispiace%20molto%20ma%20purtroppo%20non%20potr%C3%B2%20partecipare%20al%20tuo%20compleanno%20%E2%9D%A4%EF%B8%8F" target="_blank" class="btn-link btn-non-partecipo"></a>
        </div>

    </div>

    <script>
        var audio = document.getElementById('bg-music');
        var audioBtn = document.getElementById('audio-control');

        function apriInvito() {
            // Mostra subito la seconda schermata senza attendere la musica
            mostraSchermata(2);
            
            // Avvia la musica in modo asincrono sicuro
            audio.play().then(function() {
                audioBtn.style.display = 'flex';
            }).catch(function(error) {
                console.log("Riproduzione automatica bloccata dal browser, l'utente vedrà il tasto per attivarla manualmente.");
                audioBtn.style.display = 'flex';
            });
        }

        function mostraSchermata(numeroSchermata) {
            document.getElementById('screen1').style.display = 'none';
            document.getElementById('screen2').style.display = 'none';
            document.getElementById('screen3').style.display = 'none';
            
            document.getElementById('screen' + numeroSchermata).style.display = 'block';
        }

        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                audioBtn.innerText = "🎵";
            } else {
                audio.pause();
                audioBtn.innerText = "🔇";
            }
        }
    </script>
</body>
</html>
